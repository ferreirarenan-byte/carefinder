<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carefinder - Cuidadores de Idosos</title>
    <!-- Fontes solicitadas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet Maps (Open Source) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css?v=6.0">
</head>
<body>
    <header class="main-header">
        <div class="logo-section">
            <img src="logo_v2.png" alt="Carefinder Logo" class="main-logo">
            <div class="logo-text">
                <h1>Carefinder</h1>
                <p class="tagline">Conectando Cuidado com Qualidade</p>
            </div>
        </div>
        <nav class="nav-menu">
            <button id="btn-be-caregiver" class="btn-secondary">Seja Cuidador</button>
            <div id="user-area">
                <button id="btn-login" class="btn-primary">Entrar</button>
            </div>
        </nav>
    </header>

    <main class="app-container">
        <!-- Barra Lateral de Filtros -->
        <aside class="filters-sidebar glass">
            <h2>Buscar Cuidadores</h2>
            <div class="filter-group">
                <label for="filter-pais">País</label>
                <select id="filter-pais" disabled>
                    <option value="BR">Brasil</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-estado">Estado</label>
                <select id="filter-estado">
                    <option value="">Selecione um estado</option>
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="BA">Bahia</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="PR">Paraná</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="DF">Distrito Federal</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-cidade">Cidade</label>
                <input type="text" id="filter-cidade" placeholder="Ex: São Paulo">
            </div>
            <div class="filter-group">
                <label for="filter-bairro">Bairro</label>
                <input type="text" id="filter-bairro" placeholder="Ex: Jardins">
            </div>
            <div class="filter-group">
                <label for="filter-raio">Raio (km)</label>
                <input type="range" id="filter-raio" min="1" max="50" value="10">
                <span id="raio-val">10 km</span>
            </div>
            <div class="filter-group">
                <label>Tipo de Cuidado</label>
                <select id="filter-tipo">
                    <option value="todos">Todos</option>
                    <option value="basico">Básico (Companhia)</option>
                    <option value="intermediario">Intermediário (Medicação)</option>
                    <option value="avancado">Avançado (Enfermagem)</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Avaliação Mínima</label>
                <div class="stars-filter">
                    <input type="radio" name="min-stars" value="0" id="s0" checked> <label for="s0" class="star-chip">Todas</label>
                    <input type="radio" name="min-stars" value="3" id="s3"> <label for="s3" class="star-chip">3+ ⭐</label>
                    <input type="radio" name="min-stars" value="4" id="s4"> <label for="s4" class="star-chip">4+ ⭐</label>
                </div>
            </div>
            <button id="btn-search" class="btn-search">Buscar Cuidadores</button>
        </aside>

        <!-- Área Principal: Mapa e Lista -->
        <section class="content-area">
            <div id="map-container" class="glass">
                <div id="google-map" style="width: 100%; height: 100%;"></div>
            </div>
            
            <div class="list-header">
                <h3>Cuidadores Disponíveis</h3>
                <button id="btn-my-bookings" class="btn-text-link">Minhas Reservas</button>
            </div>
            
            <div id="caregivers-list" class="caregivers-grid">
                <!-- Cards de cuidadores serão inseridos via JS -->
            </div>
        </section>
    </main>

    <!-- Overlay para Drawers -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <!-- Drawer Genérico -->
    <div id="drawer-right" class="drawer glass">
        <button id="close-drawer" class="close-drawer-btn"><i data-lucide="x"></i></button>
        <div id="drawer-content" class="drawer-scroll">
            <!-- Conteúdo injetado via JS -->
        </div>
    </div>

    <script src="script.js?v=6.0"></script>
    <script>
        // Inicializar ícones do Lucide após carregamento
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
